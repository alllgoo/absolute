<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Open Graph Tags for Discord Preview -->
    <meta property="og:title" content="{{TITLE}}" />
    <meta property="og:description" content="{{DESCRIPTION}}" />
    <meta property="og:image" content="https://i.pinimg.com/originals/de/1d/11/de1d115c605fa0ca159ad2311e2f697a.gif" />
    <meta property="og:url" content="https://zeldris44.vercel.app/" />
    <meta property="og:type" content="website" />
    <meta name="theme-color" content="#2b2d31">

    <title>{{TITLE}}</title>
    <style>
        body {
            background-color: #0f0f0f;
            color: #dbdee1;
            font-family: 'gg sans', 'Noto Sans', sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .embed {
            background-color: #1e1f22;
            border-left: 4px solid #5865f2;
            border-radius: 4px;
            padding: 12px 16px;
            max-width: 520px;
            width: 100%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .author {
            display: flex;
            align-items: center;
            font-size: 0.875rem;
            font-weight: 600;
            color: #fff;
            margin-bottom: 8px;
        }
        .title {
            color: #00a8fc;
            font-size: 1rem;
            font-weight: 600;
            text-decoration: none;
            display: block;
            margin-bottom: 8px;
        }
        .description {
            font-size: 0.875rem;
            line-height: 1.125rem;
            white-space: pre-wrap;
        }
        .footer {
            font-size: 0.75rem;
            color: #949ba4;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="embed">
        <div class="author">☁️ ﾟılı ﾟ.Tokyo aid ϑρ</div>
        <a href="https://zeldris44.vercel.app/" class="title">{{TITLE}}</a>
        <div class="description">{{DESCRIPTION}}</div>
        <div class="footer">☁️ ﾟılı ﾟ.Tokyo aid ϑρ is ready to serve • Today</div>
    </div>
</body>
</html>
